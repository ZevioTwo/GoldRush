server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gold_rush?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: Dev*Ops*2023#
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.goldrush.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发时开启SQL日志
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 支付相关配置
payment:
  service-fee-rate: 0.01
  default-deposit: 20
  max-deposit: 200
  penalty-fee-rate: 0.01
  order-expire-minutes: 30

# 微信小程序配置
wechat:
  # 小程序登录配置（对应 WeChatService 中的 wechat.app-id / wechat.app-secret）
  app-id: wx9e1d8be4da6a6d70
  app-secret: 3a17f4a7d8e73a35f128aa08ab609b83

  # 微信支付配置（对应 WeChatPayConfig 的 wechat.pay.*）
  pay:
    app-id: wx1234567890abcdef
    mch-id: 1234567890
    api-key: your_api_key_32_characters
    serial-no: your_serial_number
    cert-path: /path/to/apiclient_cert.p12
    notify-url: http://localhost:8080/api/payment/notify
    freeze-notify-url: http://localhost:8080/api/payment/freeze-notify
    api-v3-key: your_api_v3_key_32_characters

# 日志配置
logging:
  level:
    com.goldrush: DEBUG
    org.springframework.web: INFO
  file:
    name: logs/gold-rush.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"